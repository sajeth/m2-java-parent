name: Publish to Maven Central

on:
  schedule:
    - cron: '0 6 1,15 * *'  # 1st and 15th of every month at 06:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 2026.5.1) — leave blank to auto-generate'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "value=$VERSION_OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            # CalVer: YYYY.M.1 on the 1st, YYYY.M.2 on the 15th
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            DAY=$(date +'%-d')
            RELEASE=$([[ "$DAY" -lt 15 ]] && echo 1 || echo 2)
            echo "value=${YEAR}.${MONTH}.${RELEASE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java with GPG
        uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          mvn --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="$RELEASE_VERSION" \
            -DgenerateBackupPoms=false

      - name: Build and publish to Maven Central
        run: mvn --no-transfer-progress deploy -Prelease -DskipTests --batch-mode
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate CycloneDX SBOM
        run: |
          mvn --no-transfer-progress org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release with SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --target "${RELEASE_SHA}" \
            target.nosync/bom.json \
            target.nosync/bom.xml

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            target.nosync/bom.json
            target.nosync/bom.xml

      - name: Commit version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: release v${RELEASE_VERSION} [skip ci]"
          git push
