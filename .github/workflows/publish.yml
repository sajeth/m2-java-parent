name: Publish to GitHub Packages

on:
  schedule:
    - cron: '0 6 1,15 * *'  # 1st and 15th of every month at 06:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 2026.5.1) — leave blank to auto-generate'
        required: false
        type: string

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Generate version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "value=$VERSION_OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            # CalVer: YYYY.M.1 on the 1st, YYYY.M.2 on the 15th
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            DAY=$(date +'%-d')
            RELEASE=$([[ "$DAY" -lt 15 ]] && echo 1 || echo 2)
            echo "value=${YEAR}.${MONTH}.${RELEASE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          mvn --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="$RELEASE_VERSION" \
            -DgenerateBackupPoms=false

      - name: Build and publish to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate CycloneDX SBOM
        run: |
          mvn --no-transfer-progress org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release with SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --target "${RELEASE_SHA}" \
            target.nosync/bom.json \
            target.nosync/bom.xml

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            target.nosync/bom.json
            target.nosync/bom.xml

      - name: Commit version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: release v${RELEASE_VERSION} [skip ci]"
          git push
