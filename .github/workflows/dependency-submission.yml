name: Dependency Submission

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  gate:
    uses: ./.github/workflows/dependabot-gate.yml
    permissions:
      pull-requests: read
    with:
      pr-number: ${{ github.event.pull_request.number }}

  submit:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use setup-java's Maven; mvnw downloads Maven on every run which is slower and unnecessary in CI
          ignore-maven-wrapper: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
