name: Dependency Submission

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  gate:
    uses: ./.github/workflows/dependabot-gate.yml
    permissions:
      pull-requests: read
    with:
      pr-number: ${{ github.event.pull_request.number }}

  submit:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use setup-java's Maven; mvnw downloads Maven on every run which is slower and unnecessary in CI
          ignore-maven-wrapper: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
