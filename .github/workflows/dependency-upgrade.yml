name: Dependency Upgrade

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Update dependency versions
        run: |
          mvn --no-transfer-progress \
            org.codehaus.mojo:versions-maven-plugin:2.17.1:update-properties \
            -DgenerateBackupPoms=false \
            -DallowMajorUpdates=false \
            -DallowMinorUpdates=true \
            -DallowIncrementalUpdates=true \
            -pl . -pl m2-springboot-parent -pl m2-core-parent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check
          key: owasp-nvd-${{ hashFiles('**/pom.xml') }}
          restore-keys: owasp-nvd-

      - name: Run OWASP check on updated dependencies
        if: steps.diff.outputs.changed == 'true'
        id: owasp
        run: |
          mvn --no-transfer-progress org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            --batch-mode \
            && echo "status=✅ No HIGH+ CVEs in updated dependencies" >> "$GITHUB_OUTPUT" \
            || echo "status=⚠️ HIGH+ CVEs detected — review before merging" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWASP_STATUS: ${{ steps.owasp.outputs.status }}
        run: |
          BRANCH="chore/dependency-upgrade-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: upgrade dependencies $(date +%Y-%m-%d) [skip ci]"
          git push origin "$BRANCH"
          printf '%s\n' \
            "## Dependency upgrades" \
            "" \
            "Auto-generated by the **Dependency Upgrade** workflow (minor + patch only, no major bumps)." \
            "" \
            "**Security scan:** ${OWASP_STATUS}" \
            "" \
            "This PR will auto-merge once all required checks pass." \
            > /tmp/pr-body.md
          gh pr create \
            --title "chore: dependency upgrades $(date +%Y-%m-%d)" \
            --label "dependency" \
            --body-file /tmp/pr-body.md \
            --base master \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
