name: Release Drafter

on:
  push:
    branches: [master]

permissions: {}

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809  # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
