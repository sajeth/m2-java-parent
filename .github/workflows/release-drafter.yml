name: Release Drafter

on:
  push:
    branches: [master]

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449  # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
