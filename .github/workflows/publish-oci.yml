name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version
        run: |
          mvn --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion=0.${{ github.run_number }}.${{ github.run_attempt }} \
            -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests
        env:
          # GH_PACKAGES_TOKEN needs read:packages + write:packages scope
          # GITHUB_TOKEN alone cannot read packages from other repos (clean-architecture-common)
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
