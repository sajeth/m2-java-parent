name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version
        run: |
          mvn --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion=0.${{ github.run_number }}.${{ github.run_attempt }} \
            -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests
        env:
          # GH_PACKAGES_TOKEN needs read:packages + write:packages scope
          # GITHUB_TOKEN alone cannot read packages from other repos (clean-architecture-common)
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate CycloneDX SBOM
        run: |
          mvn --no-transfer-progress org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish GitHub Release with SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.${{ github.run_number }}.${{ github.run_attempt }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Published to GitHub Packages as \`com.saji.m2.parent:*:${VERSION}\`" \
            --target "${{ github.sha }}" \
            target.nosync/bom.json \
            target.nosync/bom.xml \
          || gh release upload "v${VERSION}" \
            target.nosync/bom.json \
            target.nosync/bom.xml \
            --clobber

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: bump version to 0.${{ github.run_number }}.${{ github.run_attempt }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
