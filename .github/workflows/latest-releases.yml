name: Latest Releases

on:
  schedule:
    - cron: '0 6 * * 4'  # every Thursday 06:00 UTC
  workflow_dispatch:

permissions: { }

jobs:
  latest-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Update to latest releases
        run: |
          mvn --no-transfer-progress \
            org.codehaus.mojo:versions-maven-plugin:2.17.1:use-latest-releases \
            -DgenerateBackupPoms=false \
            -pl .,m2-core-parent,m2-core-parent/m2-commons-parent,m2-core-parent/m2-selenium-parent,m2-springboot-parent,m2-springboot-parent/m2-kafka-parent,m2-springboot-parent/m2-webapp-parent,m2-springboot-parent/m2-webapp-parent/m2-grpc-parent,m2-springboot-parent/m2-webapp-parent/m2-batch-parent,m2-springboot-parent/m2-webapp-parent/m2-quic-parent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.dependency-check
          key: owasp-nvd-${{ hashFiles('**/pom.xml') }}
          restore-keys: owasp-nvd-

      - name: Run OWASP check on updated dependencies
        if: steps.diff.outputs.changed == 'true'
        id: owasp
        run: |
          mvn --no-transfer-progress org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            --batch-mode \
            && echo "status=✅ No HIGH+ CVEs in updated dependencies" >> "$GITHUB_OUTPUT" \
            || echo "status=⚠️ HIGH+ CVEs detected — review before merging" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWASP_STATUS: ${{ steps.owasp.outputs.status }}
        run: |
          BRANCH="chore/latest-releases-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump dependencies to latest releases $(date +%Y-%m-%d) [skip ci]"
          git push origin "$BRANCH"
          printf '%s\n' \
            "## Latest release upgrades" \
            "" \
            "Auto-generated by the **Latest Releases** workflow (\`versions:use-latest-releases\`)." \
            "Updates \`<version>\` tags in \`<dependencies>\` and \`<dependencyManagement>\` to the" \
            "newest available release, including major version bumps." \
            "" \
            "> **Note:** Major version bumps may require manual compatibility review before merging." \
            "" \
            "**Security scan:** ${OWASP_STATUS}" \
            "" \
            "This PR will auto-merge once all required checks pass." \
            > /tmp/pr-body.md
          gh pr create \
            --title "chore: bump dependencies to latest releases $(date +%Y-%m-%d)" \
            --label "dependency" \
            --body-file /tmp/pr-body.md \
            --base master \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
