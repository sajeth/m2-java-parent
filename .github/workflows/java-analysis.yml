name: Java Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # ── SpotBugs + PMD + Checkstyle ───────────────────────────────────────────
  maven-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run SpotBugs
        run: |
          mvn --no-transfer-progress com.github.spotbugs:spotbugs-maven-plugin:spotbugs \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post SpotBugs annotations
        uses: jwgmeligmeyling/spotbugs-github-action@v1.2
        with:
          path: '**/target.nosync/spotbugsXml.xml'

      - name: Run PMD
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-pmd-plugin:pmd \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post PMD annotations
        uses: jwgmeligmeyling/pmd-github-action@v1.2
        with:
          path: '**/target.nosync/pmd.xml'

      - name: Run Checkstyle
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-checkstyle-plugin:checkstyle \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post Checkstyle annotations
        uses: jwgmeligmeyling/checkstyle-github-action@v1.2
        with:
          path: '**/target.nosync/checkstyle-result.xml'

  # ── JaCoCo Coverage ───────────────────────────────────────────────────────
  jacoco:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests and generate coverage
        run: mvn --no-transfer-progress verify --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post coverage report
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: '**/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Coverage Report'
          update-comment: true
          min-coverage-overall: 70
          min-coverage-changed-files: 70
        continue-on-error: true  # advisory only — child projects set hard thresholds

  # ── OWASP Dependency Check ────────────────────────────────────────────────
  owasp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache NVD database
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check
          key: owasp-nvd-${{ hashFiles('**/pom.xml') }}
          restore-keys: owasp-nvd-

      - name: Run OWASP Dependency Check
        run: |
          mvn --no-transfer-progress org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload OWASP report as SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: '**/target.nosync/dependency-check-report.sarif'
        continue-on-error: true

  # ── Semgrep SAST ──────────────────────────────────────────────────────────
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/java \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --error
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true  # requires GitHub Advanced Security; skips gracefully if not enabled
