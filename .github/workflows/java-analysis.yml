name: Java Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  gate:
    uses: ./.github/workflows/dependabot-gate.yml
    permissions:
      pull-requests: read
    with:
      pr-number: ${{ github.event.pull_request.number }}

  # ── SpotBugs + PMD + Checkstyle ───────────────────────────────────────────
  maven-analysis:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run SpotBugs
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress com.github.spotbugs:spotbugs-maven-plugin:spotbugs \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post SpotBugs annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/spotbugs-github-action@b8e2c3523acb34c87f14e18cbcd2d87db8c8584e  # v1.2
        with:
          path: '**/target.nosync/spotbugsXml.xml'

      - name: Run PMD
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-pmd-plugin:pmd \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post PMD annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/pmd-github-action@322e346bd76a0757c4d54ff9209e245965aa066d  # v1.2
        with:
          path: '**/target.nosync/pmd.xml'

      - name: Run Checkstyle
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-checkstyle-plugin:checkstyle \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post Checkstyle annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/checkstyle-github-action@50292990e18466f2c5d95d04ff5fab931254fa5f  # v1.2
        with:
          path: '**/target.nosync/checkstyle-result.xml'

  # ── JaCoCo Coverage ───────────────────────────────────────────────────────
  jacoco:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests and generate coverage
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: mvn --no-transfer-progress verify --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post coverage report
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848  # v1.7.2
        with:
          paths: '**/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Coverage Report'
          update-comment: true
          min-coverage-overall: 70
          min-coverage-changed-files: 70
        continue-on-error: true  # advisory only — child projects set hard thresholds

  # ── OWASP stub — satisfies branch-protection required check ─────────────
  owasp:
    needs: gate
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "OWASP/NVD check disabled — vulnerability scanning provided by Semgrep and CodeQL"

  # ── Semgrep SAST ──────────────────────────────────────────────────────────
  semgrep:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/java \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --error
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true  # requires GitHub Advanced Security; skips gracefully if not enabled
