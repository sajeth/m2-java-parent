name: Java Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  gate:
    uses: ./.github/workflows/dependabot-gate.yml
    permissions:
      pull-requests: read
    with:
      pr-number: ${{ github.event.pull_request.number }}

  # ── SpotBugs + PMD + Checkstyle ───────────────────────────────────────────
  maven-analysis:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run SpotBugs
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress com.github.spotbugs:spotbugs-maven-plugin:spotbugs \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post SpotBugs annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/spotbugs-github-action@b8e2c3523acb34c87f14e18cbcd2d87db8c8584e  # v1.2
        with:
          path: '**/target.nosync/spotbugsXml.xml'

      - name: Run PMD
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-pmd-plugin:pmd \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post PMD annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/pmd-github-action@322e346bd76a0757c4d54ff9209e245965aa066d  # v1.2
        with:
          path: '**/target.nosync/pmd.xml'

      - name: Run Checkstyle
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: |
          mvn --no-transfer-progress org.apache.maven.plugins:maven-checkstyle-plugin:checkstyle \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post Checkstyle annotations
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: jwgmeligmeyling/checkstyle-github-action@50292990e18466f2c5d95d04ff5fab931254fa5f  # v1.2
        with:
          path: '**/target.nosync/checkstyle-result.xml'

  # ── JaCoCo Coverage ───────────────────────────────────────────────────────
  jacoco:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests and generate coverage
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        run: mvn --no-transfer-progress verify --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Post coverage report
        if: github.actor != 'dependabot[bot]' && github.actor != 'app/dependabot'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920  # v1.8.0
        with:
          paths: '**/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Coverage Report'
          update-comment: true
          min-coverage-overall: 70
          min-coverage-changed-files: 70
        continue-on-error: true  # advisory only — child projects set hard thresholds

  # ── OWASP Dependency Check ───────────────────────────────────────────────
  owasp:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run OWASP Dependency Check
        run: |
          mvn --no-transfer-progress org.owasp:dependency-check-maven:check \
            -DskipTests --batch-mode \
            -DnvdApiKey="${NVD_API_KEY:-}"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: owasp-dependency-check-report
          path: '**/target.nosync/dependency-check-report.*'
          retention-days: 30
          if-no-files-found: warn

  # ── Semgrep SAST ──────────────────────────────────────────────────────────
  semgrep:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/java \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --error
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true  # requires GitHub Advanced Security; skips gracefully if not enabled
