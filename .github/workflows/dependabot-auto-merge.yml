name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && (github.actor == 'dependabot[bot]' || github.actor == 'app/dependabot')
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Wait for checks and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Wait for all checks to finish; ignore exit code — skipped counts as failure to --watch
          gh pr checks "$PR_URL" --watch --interval 30 || true
          # Fail only on real failures; skipped/neutral are acceptable
          fail_count=$(gh pr checks "$PR_URL" --json conclusion \
            --jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")] | length')
          if [ "$fail_count" -eq 0 ]; then
            gh pr merge --squash "$PR_URL"
          else
            echo "::error::$fail_count check(s) failed; not merging"
            exit 1
          fi

  rebase-on-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Rebase open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,author \
            --jq '.[] | select(.author.login == "dependabot[bot]" or .author.login == "app/dependabot") | .number' | \
          while read -r pr; do
            gh pr comment "$pr" --body "@dependabot rebase"
          done
