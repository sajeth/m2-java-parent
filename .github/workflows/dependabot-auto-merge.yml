name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [master]

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && (github.actor == 'dependabot[bot]' || github.actor == 'app/dependabot')
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

  rebase-on-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    permissions:
      pull-requests: write
    steps:
      - name: Rebase open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,author \
            --jq '.[] | select(.author.login == "dependabot[bot]" or .author.login == "app/dependabot") | .number' | \
          while read -r pr; do
            gh pr comment "$pr" --body "@dependabot rebase"
          done
