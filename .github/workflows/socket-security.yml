name: Socket Security

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: socket-scan-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  socket-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate CycloneDX SBOM
        run: |
          npm i -g @cyclonedx/cdxgen
          cdxgen -t maven -o socket.cdx.json --no-banner
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Run Socket Security Scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          GH_ISSUE_NUMBER: ${{ github.event.issue.number || 0 }}
        run: |
          PR_NUMBER=0
          if [ "$GH_EVENT_NAME" == "pull_request" ]; then
            PR_NUMBER=$GH_PR_NUMBER
          elif [ "$GH_EVENT_NAME" == "issue_comment" ]; then
            PR_NUMBER=$GH_ISSUE_NUMBER
          fi
          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"
