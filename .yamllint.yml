extends: default

rules:
  line-length:
    max: 120
    level: warning

  truthy:
    # Allow 'on' as a mapping key (GitHub Actions trigger block)
    check-keys: false

  comments:
    # Single space before inline comment is fine; block comments need it
    min-spaces-from-content: 1

  braces:
    # Allow flow mappings on a single line (e.g. permissions: {})
    forbid-flow-mappings: false

  brackets:
    # Allow flow sequences on a single line (e.g. types: [opened, synchronize])
    forbid-flow-sequences: false
